<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BS GPA Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<h1>Government Girls Degree College No.1 Hayatabad</h1>

<header class="header">

<h1>Government Girls Degree College No. 1</h1>

<h2>Hayatabad, Peshawar</h2>

<img src="logo.png" alt="College Logo" class="logo">

<h2>BS SGPA & CGPA Calculator</h2>

<p class="affiliation">

Affiliated with<br>

Shaheed Benazir Bhutto Women University

</p>

<p class="version">

Version 1.0

</p>

</header>

</div>

<div class="container">
<div class="card">

<h2>Student Information</h2>


<label>Student Name</label>
<br>

<input type="text" placeholder="Enter your name">


<br><br>


<label>Roll Number</label>
<br>

<input type="text" placeholder="Enter your roll number">


<br><br>


<label>Department</label>
<br>

<select>

<option>Select Department</option>

<option>BS Chemistry</option>

<option>BS Zoology</option>

<option>BS Botany</option>

<option>BS English</option>

<option>BS Economics</option>

<option>BS Psychology</option>

</select>


<br><br>


<label>Semester</label>
<br>

<select>

<option>Select Semester</option>

<option>1st Semester</option>

<option>2nd Semester</option>

<option>3rd Semester</option>

<option>4th Semester</option>

<option>5th Semester</option>

<option>6th Semester</option>

<option>7th Semester</option>

<option>8th Semester</option>

</select>


<br><br>


<button>

Continue

</button>
<br><br>

<h2>Semester Selection</h2>

<label>
Number of Semesters Completed
</label>

<br>

<select id="semesterCount">

<option value="0">
Select Semester
</option>

<option value="1">
1 Semester
</option>

<option value="2">
2 Semesters
</option>

<option value="3">
3 Semesters
</option>

<option value="4">
4 Semesters
</option>

<option value="5">
5 Semesters
</option>

<option value="6">
6 Semesters
</option>

<option value="7">
7 Semesters
</option>

<option value="8">
8 Semesters
</option>

</select>

<br><br>

<button onclick="generateSemesters()">

Generate Transcript

</button>


<div id="semesterContainer">

</div>

</div>

<script src="script.js"></script>
</body>

</html>
