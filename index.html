<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BS GPA Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<h1>Government Girls Degree College No.1 Hayatabad</h1>

<h2>Hayatabad, Peshawar</h2>

<img src="logo.png" alt="College Logo" class="logo">

<h2>BS SGPA & CGPA Calculator</h2>

<p class="affiliation">

Affiliated with<br>

Shaheed Benazir Bhutto Women University

</p>

<p class="version">

Version 1.0

</p>

</header>

</div>

<div class="container">
<div class="card">

<div class="student-info">

<h2>Student Information</h2>

<div class="info-grid">

<div>
<label>Student Name</label>
<input type="text" id="studentName">
</div>


<div>
<label>Roll No.</label>
<input type="text" id="rollNo">
</div>


<div>
<label>Father's Name</label>
<input type="text" id="fatherName">
</div>


<div>
<label>Registration No.</label>
<input type="text" id="registrationNo">
</div>


<div>
<label>Department</label>

<select id="department">

<option value="">Select Department</option>

<option>BS Chemistry</option>

<option>BS Zoology</option>

<option>BS Botany</option>

<option>BS English</option>

<option>BS Economics</option>

<option>BS Psychology</option>

</select>

</div>


<div>
<label>Session</label>

<select id="session">

<option value="">Select Session</option>

<option>2021–2025</option>

<option>2022–2026</option>

<option>2023–2027</option>

<option>2024–2028</option>

<option>2025–2029</option>

<option>2026–2030</option>

</select>

</div>


<div>
<label>Programme</label>

<input type="text" value="BS" readonly>

</div>


<div>

<label>Current Semester</label>

<select id="semesterCount">

<option value="1">1st Semester</option>

<option value="2">2nd Semester</option>

<option value="3">3rd Semester</option>

<option value="4">4th Semester</option>

<option value="5">5th Semester</option>

<option value="6">6th Semester</option>

<option value="7">7th Semester</option>

<option value="8">8th Semester</option>

</select>

</div>


</div>


<br>


<button onclick="generateSemesters()">

Generate Transcript

</button>


</div>
